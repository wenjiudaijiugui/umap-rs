name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core_or_benchmark: ${{ steps.filter.outputs.core_or_benchmark }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core_or_benchmark:
              - 'rust_umap/**'
              - 'benchmarks/**'
              - '.github/workflows/**'

  rust-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - name: Cargo test
        run: cargo test --manifest-path rust_umap/Cargo.toml
      - name: Release binaries
        run: cargo build --release --manifest-path rust_umap/Cargo.toml --bin fit_csv --bin bench_fit_csv

  consistency-smoke:
    needs: [changes, rust-build-test]
    if: needs.changes.outputs.core_or_benchmark == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
      - name: Install Python benchmark deps
        run: python -m pip install --upgrade pip && python -m pip install numpy scipy scikit-learn umap-learn
      - name: Install R benchmark deps
        run: Rscript -e 'install.packages(c("uwot", "jsonlite"), repos="https://cloud.r-project.org")'
      - name: Public implementation consistency smoke gate
        run: |
          python benchmarks/ci_consistency_smoke.py \
            --python-bin python \
            --rscript-bin Rscript \
            --require-r | tee consistency-smoke.json
      - name: Upload consistency smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: consistency-smoke
          path: consistency-smoke.json

  no-regression-smoke:
    needs: [changes, consistency-smoke]
    if: github.event_name == 'pull_request' && needs.changes.outputs.core_or_benchmark == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize baseline worktree
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git fetch origin "$BASE_SHA" --depth=1
          git worktree add "$RUNNER_TEMP/umap-rs-baseline" "$BASE_SHA"
      - name: Euclidean no-regression smoke gate
        run: |
          python benchmarks/ci_no_regression.py \
            --candidate-root "$GITHUB_WORKSPACE" \
            --baseline-root "$RUNNER_TEMP/umap-rs-baseline" | tee no-regression-smoke.json
      - name: Upload no-regression artifact
        uses: actions/upload-artifact@v4
        with:
          name: no-regression-smoke
          path: no-regression-smoke.json
