name: python-release

on:
  push:
    tags:
      - "v*"
      - "umap-rs-v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-wheel:
    name: build-wheel (${{ matrix.platform }}, py${{ matrix.python_version }})
    runs-on: ${{ matrix.platform == 'linux-x86_64' && 'ubuntu-latest' || matrix.platform == 'windows-x86_64' && 'windows-latest' || 'macos-14' }}
    strategy:
      fail-fast: false
      matrix:
        platform: ["linux-x86_64", "windows-x86_64", "macos-arm64"]
        python_version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - uses: PyO3/maturin-action@v1
        with:
          command: build
          args: ${{ matrix.platform == 'linux-x86_64' && format('--manifest-path umap_rs/Cargo.toml --release --out umap_rs/dist -i python{0}', matrix.python_version) || '--manifest-path umap_rs/Cargo.toml --release --out umap_rs/dist -i python' }}
          sccache: "true"
          manylinux: auto

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.platform }}-py${{ matrix.python_version }}
          path: umap_rs/dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: build-sdist
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path umap_rs/Cargo.toml --out umap_rs/dist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: umap_rs/dist/*.tar.gz
          if-no-files-found: error

  verify-artifacts:
    name: verify-artifacts
    needs: [build-wheel, build-sdist]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v5

      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Check artifact metadata
        run: uvx twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: python-release-dist
          path: dist/*
          if-no-files-found: error

  smoke-linux-wheel:
    name: smoke-linux-wheel (py${{ matrix.python_version }})
    needs: [build-wheel]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python_version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python_version }}

      - uses: astral-sh/setup-uv@v5

      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Install smoke test from matching linux wheel
        shell: bash
        env:
          PYTHON_VERSION: ${{ matrix.python_version }}
        run: |
          set -euo pipefail
          py_tag="cp${PYTHON_VERSION/./}"
          wheel_path="$(find dist -maxdepth 1 -type f -name "*${py_tag}*manylinux*.whl" | head -n 1)"
          if [[ -z "${wheel_path}" ]]; then
            echo "linux wheel not found for ${PYTHON_VERSION}" >&2
            exit 1
          fi

          export EXPECTED_VERSION
          EXPECTED_VERSION="$(basename "${wheel_path}" | sed -E 's/^umap_rs-([0-9][^-]*)-.*/\1/')"

          uv venv --python "$(command -v python)" .venv-wheel-smoke
          uv pip install --python .venv-wheel-smoke/bin/python "${wheel_path}"
          .venv-wheel-smoke/bin/python - <<'PY'
          import inspect
          import os

          import numpy as np
          from umap_rs import Umap, UmapKwargs, __version__, fit_transform

          x = np.random.default_rng(0).normal(size=(32, 6)).astype(np.float32)
          kwargs: UmapKwargs = {"n_neighbors": 10, "n_components": 2, "init": "random"}
          emb = fit_transform(x, **kwargs)
          model = Umap(**kwargs)

          assert __version__ == os.environ["EXPECTED_VERSION"]
          assert emb.shape == (32, 2)
          assert emb.dtype == np.float32
          assert "kwargs" in inspect.signature(fit_transform).parameters
          assert hasattr(model, "fit_transform_with_knn")
          PY

  test-sdist-py314:
    name: test-sdist-py314
    needs: [build-sdist]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - uses: dtolnay/rust-toolchain@stable

      - uses: astral-sh/setup-uv@v5

      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Install smoke test from sdist on Python 3.14
        id: py314_probe
        continue-on-error: true
        shell: bash
        run: |
          set -euo pipefail
          sdist_path="$(find dist -maxdepth 1 -type f -name '*.tar.gz' | head -n 1)"
          if [[ -z "${sdist_path}" ]]; then
            echo "sdist artifact not found" >&2
            exit 1
          fi

          export EXPECTED_VERSION
          EXPECTED_VERSION="$(basename "${sdist_path}" | sed -E 's/^umap_rs-([0-9][^-]*)\.tar\.gz$/\1/')"

          uv venv --python "$(command -v python)" .venv-sdist-smoke
          uv pip install --python .venv-sdist-smoke/bin/python "${sdist_path}"
          .venv-sdist-smoke/bin/python - <<'PY'
          import inspect
          import os

          import numpy as np
          from umap_rs import Umap, UmapKwargs, __version__, fit_transform

          x = np.random.default_rng(0).normal(size=(32, 6)).astype(np.float32)
          kwargs: UmapKwargs = {"n_neighbors": 10, "n_components": 2, "init": "random"}
          emb = fit_transform(x, **kwargs)
          model = Umap(**kwargs)

          assert __version__ == os.environ["EXPECTED_VERSION"]
          assert emb.shape == (32, 2)
          assert emb.dtype == np.float32
          assert "kwargs" in inspect.signature(fit_transform).parameters
          assert hasattr(model, "fit_transform_with_knn")
          PY

      - name: Summarize Python 3.14 probe
        if: always()
        shell: bash
        run: |
          {
            echo "### Python 3.14 probe"
            if [[ "${{ steps.py314_probe.outcome }}" == "success" ]]; then
              echo "- sdist install and smoke test passed on Python 3.14."
            else
              echo "- sdist install or smoke test failed on Python 3.14."
              echo "- Current blocker: PyO3 0.22.6 supports up to Python 3.13."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  publish-pypi:
    name: publish-pypi
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    needs: [verify-artifacts, smoke-linux-wheel, test-sdist-py314]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: pypi
      url: https://pypi.org/p/umap-rs

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-release-dist
          path: dist

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
