name: deep-benchmark-report

on:
  workflow_dispatch:
    inputs:
      baseline_ref:
        description: baseline ref for no-regression comparison
        required: false
        default: ''
      warmup:
        description: warmup runs per implementation
        required: false
        default: '1'
      repeats:
        description: measured repeats per implementation
        required: false
        default: '5'
      large_max_samples:
        description: max samples for california_housing
        required: false
        default: '5000'
      sample_cap_consistency:
        description: max sample size used for consistency metrics
        required: false
        default: '2000'
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  consistency-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
      - name: Install Python benchmark deps
        run: python -m pip install --upgrade pip && python -m pip install -r benchmarks/requirements-bench.txt
      - name: Install R benchmark deps
        run: Rscript benchmarks/install_r_bench_deps.R
      - name: Public implementation consistency smoke gate
        run: |
          python benchmarks/ci_consistency_smoke.py \
            --python-bin python \
            --rscript-bin Rscript \
            --require-r \
            --gate-config benchmarks/gate_thresholds.json \
            --output-json consistency-smoke.json
      - name: Upload consistency smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: deep-consistency-smoke
          path: consistency-smoke.json

  no-regression-smoke:
    needs: consistency-smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        metric: [euclidean, manhattan, cosine]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python benchmark deps
        run: python -m pip install --upgrade pip && python -m pip install -r benchmarks/requirements-bench.txt
      - name: Resolve baseline ref
        id: baseline
        env:
          BASELINE_REF_INPUT: ${{ github.event.inputs.baseline_ref }}
        run: |
          set -euo pipefail
          if [[ -n "${BASELINE_REF_INPUT}" ]]; then
            BASELINE_REF="${BASELINE_REF_INPUT}"
          else
            BASELINE_REF="HEAD~1"
          fi
          echo "baseline_ref=${BASELINE_REF}" >> "$GITHUB_OUTPUT"
      - name: Materialize baseline worktree
        run: |
          set -euo pipefail
          BASELINE_REF="${{ steps.baseline.outputs.baseline_ref }}"
          if [[ "$BASELINE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            git fetch origin "$BASELINE_REF" --depth=1
          else
            git fetch origin main --depth=2
          fi
          git worktree add "$RUNNER_TEMP/umap-rs-baseline" "$BASELINE_REF"
      - name: Metric no-regression smoke gate
        run: |
          python benchmarks/ci_no_regression.py \
            --candidate-root "$GITHUB_WORKSPACE" \
            --baseline-root "$RUNNER_TEMP/umap-rs-baseline" \
            --metric "${{ matrix.metric }}" \
            --gate-config benchmarks/gate_thresholds.json \
            --output-json "no-regression-smoke-${{ matrix.metric }}.json"
      - name: Upload no-regression artifact
        uses: actions/upload-artifact@v4
        with:
          name: deep-no-regression-smoke-${{ matrix.metric }}
          path: no-regression-smoke-${{ matrix.metric }}.json

  optimization-report:
    needs: no-regression-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
      - name: Install Python benchmark deps
        run: python -m pip install --upgrade pip && python -m pip install -r benchmarks/requirements-bench.txt
      - name: Install R benchmark deps
        run: Rscript benchmarks/install_r_bench_deps.R
      - name: Run fair benchmark report
        env:
          WARMUP: ${{ github.event.inputs.warmup || '1' }}
          REPEATS: ${{ github.event.inputs.repeats || '5' }}
          LARGE_MAX_SAMPLES: ${{ github.event.inputs.large_max_samples || '5000' }}
          SAMPLE_CAP_CONSISTENCY: ${{ github.event.inputs.sample_cap_consistency || '2000' }}
        run: |
          python benchmarks/compare_real_impls_fair.py \
            --python-bin python \
            --rscript-bin Rscript \
            --warmup "$WARMUP" \
            --repeats "$REPEATS" \
            --large-max-samples "$LARGE_MAX_SAMPLES" \
            --sample-cap-consistency "$SAMPLE_CAP_CONSISTENCY" \
            --report-json benchmarks/report_real_fair.deep.json \
            --report-md benchmarks/report_real_fair.deep.md
      - name: Append report excerpt to job summary
        run: |
          echo '## Optimization-stage benchmark report excerpt' >> "$GITHUB_STEP_SUMMARY"
          sed -n '1,160p' benchmarks/report_real_fair.deep.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: deep-benchmark-report
          path: |
            benchmarks/report_real_fair.deep.md
            benchmarks/report_real_fair.deep.json
