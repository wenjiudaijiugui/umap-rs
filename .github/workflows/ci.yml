name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      core_or_benchmark: ${{ steps.filter.outputs.core_or_benchmark }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core_or_benchmark:
              - 'rust_umap/**'
              - 'benchmarks/**'
              - '.github/workflows/**'

  rust-build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - name: Cargo test
        run: cargo test --manifest-path rust_umap/Cargo.toml
      - name: Release binaries
        run: cargo build --release --manifest-path rust_umap/Cargo.toml --bin fit_csv --bin bench_fit_csv

  consistency-smoke:
    needs: [changes, rust-build-test]
    if: needs.changes.outputs.core_or_benchmark == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'
      - name: Install Python benchmark deps
        run: python -m pip install --upgrade pip && python -m pip install -r benchmarks/requirements-bench.txt
      - name: Install R benchmark deps
        run: Rscript benchmarks/install_r_bench_deps.R
      - name: Public implementation consistency smoke gate
        run: |
          python benchmarks/ci_consistency_smoke.py \
            --python-bin python \
            --rscript-bin Rscript \
            --require-r | tee consistency-smoke.json
      - name: Upload consistency smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: consistency-smoke
          path: consistency-smoke.json

  ann-e2e-smoke:
    needs: [changes, rust-build-test]
    if: needs.changes.outputs.core_or_benchmark == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python benchmark deps
        run: python -m pip install --upgrade pip && python -m pip install -r benchmarks/requirements-bench.txt
      - name: ANN/e2e smoke gate (python_umap_learn vs rust_umap)
        run: |
          python benchmarks/ci_ann_smoke.py \
            --python-bin python \
            --rscript-bin "" \
            --seed 42 \
            --warmup 0 \
            --repeats 1 \
            --sample-cap 1200 \
            --trust-gap 0.03 \
            --recall-gap 0.08 \
            --pairwise-min-overlap 0.35 | tee ann-e2e-smoke.json
      - name: Upload ANN/e2e smoke artifact
        uses: actions/upload-artifact@v4
        with:
          name: ann-e2e-smoke
          path: ann-e2e-smoke.json

  no-regression-smoke:
    needs: [changes, consistency-smoke, ann-e2e-smoke]
    if: needs.changes.outputs.core_or_benchmark == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        metric: [euclidean, manhattan, cosine]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust_umap
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Resolve baseline ref
        id: baseline
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          if [[ "$EVENT_NAME" == "pull_request" && -n "${PR_BASE_SHA}" ]]; then
            BASE_REF="$PR_BASE_SHA"
          elif [[ "$EVENT_NAME" == "push" && -n "${PUSH_BEFORE_SHA}" && "${PUSH_BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            BASE_REF="$PUSH_BEFORE_SHA"
          else
            BASE_REF="HEAD~1"
          fi
          echo "base_ref=${BASE_REF}" >> "$GITHUB_OUTPUT"
      - name: Materialize baseline worktree
        run: |
          set -euo pipefail
          BASE_REF="${{ steps.baseline.outputs.base_ref }}"
          if [[ "$BASE_REF" =~ ^[0-9a-f]{40}$ ]]; then
            git fetch origin "$BASE_REF" --depth=1
          else
            git fetch origin main --depth=2
          fi
          git worktree add "$RUNNER_TEMP/umap-rs-baseline" "$BASE_REF"
      - name: Metric no-regression smoke gate
        run: |
          python benchmarks/ci_no_regression.py \
            --candidate-root "$GITHUB_WORKSPACE" \
            --baseline-root "$RUNNER_TEMP/umap-rs-baseline" \
            --metric "${{ matrix.metric }}" | tee "no-regression-smoke-${{ matrix.metric }}.json"
      - name: Upload no-regression artifact
        uses: actions/upload-artifact@v4
        with:
          name: no-regression-smoke-${{ matrix.metric }}
          path: no-regression-smoke-${{ matrix.metric }}.json
