name: ecosystem-python-binding

on:
  pull_request:
    paths:
      - 'rust_umap/**'
      - 'umap_rs/**'
      - 'benchmarks/*ecosystem*'
      - 'benchmarks/run_umap_rs*.py'
      - '.github/workflows/ecosystem-python-binding.yml'
  push:
    branches:
      - main
    paths:
      - 'rust_umap/**'
      - 'umap_rs/**'
      - 'benchmarks/*ecosystem*'
      - 'benchmarks/run_umap_rs*.py'
      - '.github/workflows/ecosystem-python-binding.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  binding-smoke-and-benchmark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps
        run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> "$GITHUB_PATH"
          . .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install maturin pytest -r benchmarks/requirements-bench.txt
      - name: Build and install umap_rs
        run: |
          maturin develop --manifest-path umap_rs/Cargo.toml
      - name: Run umap_rs tests
        run: |
          python -I -m pytest -q umap_rs/tests/test_binding.py
      - name: Run ecosystem benchmark smoke
        run: |
          python benchmarks/compare_ecosystem_python_binding.py \
            --python-bin python \
            --warmup 0 \
            --repeats 1 \
            --sample-cap-consistency 1200 \
            --ensure-ann-coverage \
            --large-max-samples 4097
      - name: Run ecosystem machine-readable gate
        run: |
          python benchmarks/ci_ecosystem_python_binding_gate.py \
            --report-json benchmarks/report_ecosystem_python_binding.json \
            --max-rust-over-python-speed-ratio 2.5
      - name: Upload ecosystem benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-python-binding-report
          path: |
            benchmarks/report_ecosystem_python_binding.json
            benchmarks/report_ecosystem_python_binding.md
